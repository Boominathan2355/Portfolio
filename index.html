<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta Tags & Security -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://schema.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' ws: wss: https://api.emailjs.com;">
    <title>%VITE_SITE_TITLE%</title>
    <meta name="title" content="%VITE_SITE_TITLE%">
    <meta name="description" content="%VITE_SITE_DESCRIPTION%">
    <meta name="keywords" content="%VITE_SITE_KEYWORDS%">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="author" content="%VITE_AUTHOR_NAME%">
    <meta name="theme-color" content="%VITE_THEME_COLOR%">
    <meta name="google-site-verification" content="%VITE_GOOGLE_SITE_VERIFICATION%">
    <link rel="canonical" href="%VITE_SITE_URL%/">

    <!-- Geo Tags -->
    <meta name="geo.region" content="%VITE_GEO_REGION%">
    <meta name="geo.placename" content="%VITE_GEO_PLACENAME%">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="%VITE_SITE_URL%/">
    <meta property="og:title" content="%VITE_SITE_TITLE%">
    <meta property="og:description" content="%VITE_SITE_DESCRIPTION%">
    <meta property="og:image" content="%VITE_OG_IMAGE%">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="%VITE_AUTHOR_NAME%">
    <meta property="og:site_name" content="%VITE_AUTHOR_NAME%">
    <meta property="og:locale" content="en_US">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="%VITE_TWITTER_HANDLE%">
    <meta name="twitter:creator" content="%VITE_TWITTER_HANDLE%">
    <meta name="twitter:title" content="%VITE_SITE_TITLE%">
    <meta name="twitter:description" content="%VITE_SITE_DESCRIPTION%">
    <meta name="twitter:image" content="%VITE_OG_IMAGE%">
    <meta name="twitter:image:alt" content="%VITE_AUTHOR_NAME%">

    <!-- Progressive Web App -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="application-name" content="%VITE_AUTHOR_NAME%">
    <meta name="apple-mobile-web-app-title" content="%VITE_AUTHOR_NAME%">

    <!-- Preconnect & Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Manifest & Apple Touch -->
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/logo.svg">

    <!--
      Schema.org JSON-LD (Rich Results)
      Scalar fields (name/url/image/email/jobTitle/description) come from
      .env. The arrays below (sameAs, alumniOf, knowsAbout, knowsLanguage)
      can't be templated by Vite's %VAR% replacement — edit them directly
      to match your own social links, education, and skills.
    -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "%VITE_AUTHOR_NAME%",
        "url": "%VITE_SITE_URL%/",
        "image": "%VITE_OG_IMAGE%",
        "sameAs": [
          "https://github.com/Boominathan2355",
          "https://linkedin.com/in/boominathan-alagirisamy"
        ],
        "jobTitle": "Full Stack Developer & AI Engineering Student",
        "alumniOf": {
          "@type": "CollegeOrUniversity",
          "name": "Dr. Mahalingam College of Engineering and Technology",
          "address": {
            "@type": "PostalAddress",
            "addressCountry": "India",
            "addressRegion": "Tamil Nadu"
          }
        },
        "knowsAbout": [
          "Artificial Intelligence",
          "Data Science",
          "Machine Learning",
          "Deep Learning",
          "Transformers",
          "IoT (Internet of Things)",
          "Full Stack Development",
          "Python Programming",
          "React.js",
          "Node.js",
          "MongoDB",
          "SQL Database"
        ],
        "knowsLanguage": ["English", "Tamil"],
        "description": "%VITE_SITE_DESCRIPTION%",
        "email": "%VITE_AUTHOR_EMAIL%",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "India",
          "addressRegion": "Tamil Nadu"
        },
        "hasOccupation": {
          "@type": "Occupation",
          "name": "Full Stack Developer & AI Engineering Student",
          "skills": "React, TypeScript, Redux, Python, PyTorch, TensorFlow, MongoDB, Node.js, REST APIs, TanStack Table, ECharts"
        }
      }
    </script>

    <!-- Website Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "%VITE_SITE_TITLE%",
        "url": "%VITE_SITE_URL%/",
        "description": "%VITE_SITE_DESCRIPTION%",
        "author": {
          "@type": "Person",
          "name": "%VITE_AUTHOR_NAME%"
        },
        "inLanguage": "en-US"
      }
    </script>

    <!-- Breadcrumb Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "%VITE_SITE_URL%/"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "About",
            "item": "%VITE_SITE_URL%/#about"
          },
          {
            "@type": "ListItem",
            "position": 3,
            "name": "Projects",
            "item": "%VITE_SITE_URL%/#projects"
          },
          {
            "@type": "ListItem",
            "position": 4,
            "name": "Contact",
            "item": "%VITE_SITE_URL%/#contact"
          }
        ]
      }
    </script>
  </head>
  <body>
    <main id="root" role="main"></main>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <p>Please enable JavaScript to view this website.</p>
    </noscript>
  </body>
</html>
